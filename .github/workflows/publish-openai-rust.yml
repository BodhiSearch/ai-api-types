name: Publish OpenAI Rust Crate

on:
  push:
    tags:
      - "openai-rs/v*"

concurrency:
  group: publish-openai-rs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/openai-rs/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Releasing OpenAI Rust crate v$TAG_VERSION"

      - name: Set crate version
        working-directory: ./crates/openai
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml
          echo "Updated Cargo.toml:"
          head -5 Cargo.toml

      - name: Verify crate builds
        run: cargo check -p openai-api-types

      - name: Package crate
        run: cargo package -p openai-api-types --allow-dirty

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/package/*.crate
          name: "OpenAI Rust crate v${{ steps.version.outputs.version }}"
          body: |
            Rust type definitions for the OpenAI API v${{ steps.version.outputs.version }}

            ```toml
            [dependencies]
            openai-api-types = "${{ steps.version.outputs.version }}"
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate with crates.io (OIDC trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish -p openai-api-types --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
