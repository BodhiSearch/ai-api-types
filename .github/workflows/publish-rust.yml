name: Publish Anthropic Rust Crate

on:
  push:
    tags:
      - "anthropic-rs/v*"

concurrency:
  group: publish-anthropic-rs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/anthropic-rs/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Releasing Anthropic Rust crate v$TAG_VERSION"

      - name: Set crate version
        working-directory: ./crates/anthropic
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml
          echo "Updated Cargo.toml:"
          head -5 Cargo.toml

      - name: Verify crate builds
        run: cargo check -p anthropic-api-types

      - name: Package crate
        run: cargo package -p anthropic-api-types --allow-dirty

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: |
            Rust type definitions for the Anthropic API v${{ steps.version.outputs.version }}

            ```toml
            [dependencies]
            anthropic-api-types = "${{ steps.version.outputs.version }}"
            ```
        run: |
          gh release create "$GITHUB_REF_NAME" target/package/*.crate \
            --title "Anthropic Rust crate v${VERSION}" \
            --notes "$NOTES"

      - name: Authenticate with crates.io (OIDC trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish -p anthropic-api-types --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
